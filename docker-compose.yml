services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: p2pbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: p2pbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U p2pbot -d p2pbot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    build:
      context: .
      target: runtime
    env_file: .env
    environment:
      # psycopg URL for Alembic sync migrations (avoids asyncpg enum bug)
      POSTGRES_URI: postgresql+asyncpg://p2pbot:${POSTGRES_PASSWORD:-password}@postgres:5432/p2pbot
      ALEMBIC_DB_URL: postgresql+psycopg://p2pbot:${POSTGRES_PASSWORD:-password}@postgres:5432/p2pbot
    depends_on:
      postgres:
        condition: service_healthy
    command: ["/bin/sh", "/app/migrate.sh"]
    restart: "no"

  bot:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_URI: postgresql+asyncpg://p2pbot:${POSTGRES_PASSWORD:-password}@postgres:5432/p2pbot
      ALEMBIC_DB_URL: postgresql+psycopg://p2pbot:${POSTGRES_PASSWORD:-password}@postgres:5432/p2pbot
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "bot.main"]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  api:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_URI: postgresql+asyncpg://p2pbot:${POSTGRES_PASSWORD:-password}@postgres:5432/p2pbot
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api
    volumes:
      - uploads_data:/usr/share/nginx/html/uploads

volumes:
  postgres_data:
  uploads_data:
